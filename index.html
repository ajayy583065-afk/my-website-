<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajay ❤️ Kavita</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap"
        rel="stylesheet">

    <style>
        /* ================= GLOBAL ================= */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow-x: hidden;
            color: white;
            min-height: 100vh;
            transition: 0.5s;
        }

        img {
            display: block;
        }

        /* ================= HEART RAIN ================= */

        .hearts {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: #ff4d6d;
            font-size: 22px;
            animation: heartFall linear forwards;
            user-select: none;
            text-shadow:
                0 0 10px #ff4d6d,
                0 0 20px #ff4d6d,
                0 0 40px #ff4d6d;
        }

        @keyframes heartFall {

            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }

        }

        /* ================= INTRO ================= */

        .intro {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: introHide 4s forwards;
        }

        .intro h1 {
            font-size: 80px;
            font-family: 'Pacifico', cursive;
            animation: glow 2s infinite alternate;
        }

        .intro p {
            margin-top: 15px;
            letter-spacing: 4px;
            font-size: 20px;
        }

        @keyframes introHide {

            0% {
                opacity: 1;
            }

            85% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }

        }

        @keyframes glow {

            from {
                text-shadow: 0 0 10px white;
            }

            to {
                text-shadow:
                    0 0 20px #ff4d6d,
                    0 0 40px #ff4d6d,
                    0 0 70px #ff4d6d;
            }

        }

        /* ================= HEADER ================= */

        header {
            text-align: center;
            padding: 80px 20px 30px;
            position: relative;
            z-index: 2;
        }

        header h1 {
            font-size: 75px;
            font-family: 'Pacifico', cursive;
            animation: glow 2s infinite alternate;
        }

        /* ================= TYPING ================= */

        .typing {
            margin-top: 20px;
            font-size: 24px;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid white;
            width: 0;
            margin-inline: auto;
            animation: typing 5s steps(30) infinite alternate;
        }

        @keyframes typing {

            from {
                width: 0;
            }

            to {
                width: 390px;
            }

        }

        /* ================= BUTTONS ================= */

        .top-buttons {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: 0.4s;
        }

        button:hover {
            transform: scale(1.08);
        }

        .love-btn {
            background: #ff4d6d;
            color: white;
        }

        .mode-btn {
            background: white;
            color: black;
        }

        /* ================= SLIDER ================= */

        .slider {
            width: 100%;
            overflow: hidden;
            padding: 20px 0;
            position: relative;
            z-index: 2;
        }

        .slider-track {
            display: flex;
            gap: 20px;
            width: max-content;
            animation: smoothScroll 28s linear infinite;
        }

        .slider-track:hover {
            animation-play-state: paused;
        }

        /* CARD */

        .slide-card {
            width: 320px;
            height: 450px;
            border-radius: 30px;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
            transition: 0.5s;
        }

        .slide-card:hover {
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 0 35px #ff4d6d;
        }

        .slide-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .slide-card:hover img {
            transform: scale(1.08);
        }

        @keyframes smoothScroll {

            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(calc(-340px * 6));
            }

        }

        /* ================= LOVE CARDS ================= */

        .cards {
            width: 92%;
            margin: 40px auto 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            position: relative;
            z-index: 2;
        }

        .card {
            position: relative;
            height: 340px;
            border-radius: 25px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            transition: 0.5s;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 30px #ff4d6d;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
        }

        .overlay h2 {
            font-size: 22px;
        }

        /* ================= POPUP ================= */

        .popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .popup-content {
            width: 90%;
            max-width: 500px;
            background: white;
            color: #111;
            padding: 35px;
            border-radius: 25px;
            text-align: center;
        }

        .popup-content h2 {
            color: #ff4d6d;
            font-family: 'Pacifico', cursive;
            margin-bottom: 20px;
        }

        .popup-content p {
            line-height: 1.8;
        }

        .close-btn {
            margin-top: 20px;
            background: #ff4d6d;
            color: white;
        }

        /* ================= MUSIC ================= */

        .music-player {
            position: fixed;
            right: 10px;
            bottom: 10px;
            z-index: 99999;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 6px 10px;
            border-radius: 50px;
        }

        .music-player audio {
            width: 140px;
            height: 30px;
        }

        /* ================= LIGHT PINK MODE ================= */

        .light-mode {
            background: linear-gradient(135deg,
                    #ffd6e7,
                    #ffc2d1,
                    #ffb3c6,
                    #ffc8dd);
            color: #111;
        }

        .light-mode header h1 {
            color: #ff1e56;
        }

        .light-mode .typing {
            color: #111;
            border-right: 3px solid #ff1e56;
        }

        .light-mode .card {
            background: rgba(255, 255, 255, 0.45);
        }

        .light-mode .slide-card {
            background: rgba(255, 255, 255, 0.45);
        }

        .light-mode .love-btn {
            background: #ff4d88;
        }

        .light-mode .mode-btn {
            color: #ff1e56;
        }

        .light-mode .overlay {
            background: linear-gradient(to top,
                    rgba(255, 255, 255, 0.8),
                    transparent);
        }

        .light-mode .overlay h2 {
            color: #111;
        }

        .light-mode .popup-content {
            background: #fff0f5;
        }

        .light-mode .heart {
            color: #ff4d88;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:768px) {

            header h1 {
                font-size: 42px;
            }

            .typing {
                width: 230px;
                font-size: 15px;
            }

            .slide-card {
                width: 210px;
                height: 300px;
            }

            .cards {
                grid-template-columns: 1fr;
            }

            .card {
                height: 280px;
            }

            .music-player audio {
                width: 110px;
            }

            @keyframes smoothScroll {

                100% {
                    transform: translateX(calc(-230px * 6));
                }

            }

        }

        @media(max-width:480px) {

            header h1 {
                font-size: 34px;
            }

            .slide-card {
                width: 180px;
                height: 250px;
            }

            .typing {
                width: 200px;
                font-size: 13px;
            }

            .card {
                height: 240px;
            }

            @keyframes smoothScroll {

                100% {
                    transform: translateX(calc(-200px * 6));
                }

            }

        }
    </style>
</head>

<body>

    <!-- MUSIC -->

    <script>

        /* HEART RAIN */

        const heartsContainer = document.getElementById("hearts");

        function createHeart() {

            const heart = document.createElement("div");

            heart.classList.add("heart");

            const emojis = ["❤️", "💖", "💕", "💘", "💝"];

            heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

            heart.style.left = Math.random() * 100 + "vw";

            heart.style.fontSize = (Math.random() * 20 + 15) + "px";

            heart.style.animationDuration = (Math.random() * 3 + 4) + "s";

            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);

        }

        setInterval(createHeart, 200);

        /* POPUP */

        function openPopup() {
            document.getElementById("popup").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }

        /* PINK MODE */

        function toggleMode() {

        }
