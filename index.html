<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ajay ❤️ Kavita</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff0066, #ff4d88, #ffd6e0);
            overflow: hidden;
            padding: 20px;
        }

        /* HEARTS */

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }

        .hearts span {
            position: absolute;
            bottom: -100px;
            font-size: 24px;
            animation: heart 10s linear infinite;
            opacity: 0.7;
        }

        .hearts span:nth-child(1) {
            left: 10%;
        }

        .hearts span:nth-child(2) {
            left: 25%;
        }

        .hearts span:nth-child(3) {
            left: 40%;
        }

        .hearts span:nth-child(4) {
            left: 60%;
        }

        .hearts span:nth-child(5) {
            left: 80%;
        }

        @keyframes heart {

            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) scale(1.5);
                opacity: 0;
            }

        }

        /* CARD BOX */

        .card-box {
            width: 380px;
            height: 680px;
            perspective: 2000px;
            animation: floating 4s ease-in-out infinite;
            transition: 0.4s;
        }

        .card-box:hover {
            transform: scale(1.03);
        }

        @keyframes floating {

            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-12px);
            }

            100% {
                transform: translateY(0px);
            }

        }

        /* CARD */

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1s;
        }

        /* FLIP */

        .card.flip {
            transform: rotateY(180deg);
        }

        /* FRONT & BACK */

        .front,
        .back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 30px;
            overflow: hidden;
            backface-visibility: hidden;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.5);

            transition: 0.4s;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 25px;
            text-align: center;
        }

        /* HOVER GLOW */

        .front:hover,
        .back:hover {
            box-shadow:
                0 0 25px rgba(255, 255, 255, 0.5),
                0 25px 60px rgba(0, 0, 0, 0.5);
        }

        /* FRONT */

        .front h1 {
            font-size: 40px;
            color: white;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        .main-img {
            width: 100%;
            height: 360px;
            object-fit: cover;
            border-radius: 25px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            transition: 0.4s;
        }

        .main-img:hover {
            transform: scale(1.03);
        }

        .front p {
            margin-top: 20px;
            font-size: 18px;
            line-height: 1.7;
            color: white;
        }

        /* BACK */

        .back {
            transform: rotateY(180deg);
        }

        .back h2 {
            font-size: 30px;
            color: white;
            margin-bottom: 20px;
        }

        /* GALLERY */

        .gallery {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .gallery img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 18px;
            cursor: pointer;
            transition: 0.4s;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px white;
        }

        /* AUDIO */

        audio {
            width: 100%;
            margin-top: 20px;
            filter: drop-shadow(0 0 10px white);
        }

        /* BUTTON */

        .btn {
            margin-top: 20px;
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            background: white;
            color: #ff0066;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.4s;
        }

        .btn:hover {
            transform: scale(1.08);
            background: #ff0066;
            color: white;
            box-shadow: 0 0 20px #ff0066;
        }

        /* POPUP */

        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
        }

        .popup img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            box-shadow: 0 0 40px white;
            animation: zoom 0.4s ease;
        }

        @keyframes zoom {

            from {
                transform: scale(0.5);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }

        }

        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 45px;
            color: white;
            cursor: pointer;
        }

        /* MOBILE */

        @media(max-width:500px) {

            .card-box {
                width: 100%;
                max-width: 350px;
                height: 580px;
            }

            .main-img {
                height: 280px;
            }

            .gallery img {
                height: 95px;
            }

            .front h1 {
                font-size: 32px;
            }

            .back h2 {
                font-size: 26px;
            }

        }
    </style>
</head>

<body>

    <!-- HEARTS -->

    <div class="hearts">
        <span>❤️</span>
        <span>💖</span>
        <span>💕</span>
        <span>💘</span>
        <span>💞</span>
    </div>

    <!-- CARD -->

    <div class="card-box">

        <div class="card" id="card">

            <!-- FRONT -->

            <div class="front">

                <h1>Ajay ❤️ Kavita</h1>

                <img src="kavi2.jpeg" class="main-img">

                <p>
                    💖 “I Love You Forever…
                    and ever, and ever, Radhe ❤️✨
                </p>

                <button class="btn" onclick="flipCard()">
                    Open Memories 💖
                </button>

            </div>

            <!-- BACK -->

            <div class="back">

                <h2>Our Memories ❤️</h2>

                <div class="gallery">

                    <img src="kavi1.jpeg" onclick="openImage(this.src)">
                    <img src="kavi3.jpeg" onclick="openImage(this.src)">
                    <img src="kavi11.jpeg" onclick="openImage(this.src)">
                    <img src="kavi12.jpeg" onclick="openImage(this.src)">

                </div>

                <audio controls loop autoplay>
                    <source src="Saiyaara Reprise Female (Slowed  Reverb)  Shreya Ghoshal  SR Lofi.mp3"
                        type="audio/mp3">
                </audio>

                <button class="btn" onclick="flipCard()">
                    Back ❤️
                </button>

            </div>

        </div>

    </div>

    <!-- POPUP -->

    <div class="popup" id="popup">

        <span class="close" onclick="closeImage()">×</span>

        <img id="popup-img">

    </div>

    <script>

        /* FLIP CARD */

        function flipCard() {

            document.getElementById("card").classList.toggle("flip");

        }

        /* OPEN IMAGE */

        function openImage(src) {

            document.getElementById("popup").style.display = "flex";
            document.getElementById("popup-img").src = src;

        }

        /* CLOSE IMAGE */

        function closeImage() {

            document.getElementById("popup").style.display = "none";

        }

        /* OUTSIDE CLICK CLOSE */

        window.onclick = function (e) {

            const popup = document.getElementById("popup");

            if (e.target == popup) {

                popup.style.display = "none";

            }

        }

    </script>

</body>

</html>
